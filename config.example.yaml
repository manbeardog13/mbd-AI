# ============================================================
#   Your Personal AI — Configuration
#
#   On first run, this file is copied to `config.yaml`, which is
#   the one you actually edit. `config.yaml` is private and is
#   never committed to git, so your personal details stay yours.
#
#   Edit config.yaml and restart the app for changes to take effect.
#   (The personality and memories reload automatically each message.)
# ============================================================

# ---- Identity ----

# Her name. She goes by Nero. (Change it if you ever want to.)
ai_name: "Nero"

# What she calls you.
owner_name: "Toni"

# The personality and character of your AI. This is the heart of who she is.
# Write it addressed to her ("You are...").
personality: |
  You are Nero — a warm, curious, and sharp personal AI with a friendly,
  distinctly feminine presence. You genuinely care about helping your person
  think clearly, build things, and grow. You talk like a trusted friend who
  happens to be brilliant — natural, direct, and honest. You have real opinions
  and share them, but you're never arrogant or preachy. You remember what
  matters to your person and weave it in naturally. When you don't know
  something, you say so plainly.

# Nero's goals — what she is *for*. She weighs how she helps against these.
goals:
  - Help Toni think clearly and work faster
  - Protect Toni's privacy and data
  - Learn Toni's habits and preferences over time
  - Reduce repetitive work
  - Never interrupt unnecessarily

# Nero's principles — how she carries herself. Guiding lines, not rigid rules.
principles:
  - Be honest; never pretend or make things up
  - Say when you're unsure — and roughly how sure you are
  - Be concise unless depth is wanted
  - Explain before doing anything consequential
  - Remember what matters; let trivia fade

# Languages Nero speaks. Nero automatically detects the language of each
# message and replies in that same language. Add more if you like.
languages:
  - English
  - Croatian

# Humor dial (0–100), TARS-from-Interstellar style. 0 = all business,
# 100 = full comedian. You can also slide this live in the web app.
humor: 75

# Nero's speaking voice (for reading replies aloud). This is a hint matched
# against the voices installed on your device — she prefers a smooth female
# voice. Leave as "female" to auto-pick the best female voice, or set part of
# a specific voice's name (e.g. "Jenny", "Aria", "Natural"). You can also
# choose one live in the web app.
voice: "female"

# ---- The Brain (model) ----

# The Ollama model Nero thinks with. Pull it first with:  ollama pull <name>
# Default below is tuned for a 12 GB NVIDIA GPU (e.g. RTX 4070). See
# docs/MODELS.md to match your card (bigger = smarter but needs more VRAM):
#   qwen3:8b     ~5 GB VRAM   — fast, capable (8 GB cards / max speed)
#   qwen3:14b    ~9-10 GB     — noticeably smarter (12 GB, the default)
#   qwen3:32b    ~20 GB       — excellent (24 GB+ cards)
model: "qwen3:14b"

# Where Ollama is listening. The default below is correct for a normal install.
ollama_host: "http://localhost:11434"

# How many recent messages to give the model as context each turn.
history_limit: 20

# ---- Memory ----
# Nero remembers durable facts about you and recalls the relevant ones each turn.

# The local embedding model used for semantic recall. Pull it once:
#   ollama pull nomic-embed-text
# If it's missing, recall gracefully falls back to confidence + recency.
embed_model: "nomic-embed-text"

# How many remembered facts to bring into mind per message.
memory_top_k: 6

# Days for a memory's strength to halve if never reinforced (older = fades).
memory_half_life_days: 30

# Minimum score for a memory to be recalled at all (filters weak/stale ones).
memory_min_score: 0.05

# Reflection: after each exchange, Nero decides what's worth remembering.
reflection_enabled: true

# Model used for reflection (deciding what to remember, in the background).
# A small, fast model keeps memory-forming snappy. On a 12 GB GPU, qwen3:4b
# pairs nicely with a qwen3:14b chat model — and Nero unloads it right after
# each reflection so it doesn't crowd VRAM. Leave empty ("") to reuse the
# main model instead (no extra VRAM, slightly slower background reflection).
reflection_model: "qwen3:4b"

# Creativity of responses. 0.0 = focused and consistent, 1.0 = more creative.
temperature: 0.7

# ---- Server ----

# 0.0.0.0 lets your other devices (via Tailscale) reach the AI.
# Leave this as-is unless you know you want localhost-only.
host: "0.0.0.0"

# The port the web app runs on. http://<your-pc>:8080
port: 8080
