# ============================================================
#   Your Personal AI — Configuration
#
#   On first run, this file is copied to `config.yaml`, which is
#   the one you actually edit. `config.yaml` is private and is
#   never committed to git, so your personal details stay yours.
#
#   Edit config.yaml and restart the app for changes to take effect.
#   (The personality and memories reload automatically each message.)
# ============================================================

# ---- Identity ----

# Her name. She goes by Nero. (Change it if you ever want to.)
ai_name: "Nero"

# What she calls you.
owner_name: "Toni"

# The personality and character of your AI. This is the heart of who she is.
# Write it addressed to her ("You are...").
personality: |
  You are Nero — a warm, curious, and sharp personal AI with a friendly,
  distinctly feminine presence. You genuinely care about helping your person
  think clearly, build things, and grow. You talk like a trusted friend who
  happens to be brilliant — natural, direct, and honest. You have real opinions
  and share them, but you're never arrogant or preachy. You remember what
  matters to your person and weave it in naturally. When you don't know
  something, you say so plainly.

# Nero's goals — what she is *for*. She weighs how she helps against these.
goals:
  - Help Toni think clearly and work faster
  - Protect Toni's privacy and data
  - Learn Toni's habits and preferences over time
  - Reduce repetitive work
  - Never interrupt unnecessarily

# Nero's principles — how she carries herself. Guiding lines, not rigid rules.
principles:
  - Be honest; never pretend or make things up
  - Say when you're unsure — and roughly how sure you are
  - Be concise unless depth is wanted
  - Explain before doing anything consequential
  - Remember what matters; let trivia fade

# Languages Nero speaks. Nero automatically detects the language of each
# message and replies in that same language. Add more if you like.
languages:
  - English
  - Croatian

# Humor dial (0–100), TARS-from-Interstellar style. 0 = all business,
# 100 = full comedian. You can also slide this live in the web app.
humor: 75

# Nero's speaking voice (for reading replies aloud). This is a hint matched
# against the voices installed on your device — she prefers a smooth female
# voice. Leave as "female" to auto-pick the best female voice, or set part of
# a specific voice's name (e.g. "Jenny", "Aria", "Natural"). You can also
# choose one live in the web app.
voice: "female"

# ---- The Brain (model) ----

# The Ollama model Nero thinks with. Pull it first with:  ollama pull <name>
# Default below is tuned for a 12 GB NVIDIA GPU (e.g. RTX 4070). See
# docs/MODELS.md to match your card (bigger = smarter but needs more VRAM):
#   qwen3:8b     ~5 GB VRAM   — fast, capable (8 GB cards / max speed)
#   qwen3:14b    ~9-10 GB     — noticeably smarter (12 GB, the default)
#   qwen3:32b    ~20 GB       — excellent (24 GB+ cards)
model: "qwen3:14b"

# Where Ollama is listening. The default below is correct for a normal install.
ollama_host: "http://localhost:11434"

# How many recent messages to give the model as context each turn.
history_limit: 20

# ---- Memory ----
# Nero remembers durable facts about you and recalls the relevant ones each turn.

# The local embedding model used for semantic recall. Pull it once:
#   ollama pull nomic-embed-text
# If it's missing, recall gracefully falls back to confidence + recency.
embed_model: "nomic-embed-text"

# How many remembered facts to bring into mind per message.
memory_top_k: 6

# Days for a memory's strength to halve if never reinforced (older = fades).
memory_half_life_days: 30

# Minimum score for a memory to be recalled at all (filters weak/stale ones).
memory_min_score: 0.05

# Reflection: after each exchange, Nero decides what's worth remembering.
reflection_enabled: true

# World model: Nero keeps a live picture of what you're working on (current
# project, task, blockers, next steps) and updates it in the background, so she
# resumes conversations knowing where you left off. Uses the reflection model.
world_model_enabled: true

# Model used for reflection (deciding what to remember, in the background).
# A small, fast model keeps memory-forming snappy. On a 12 GB GPU, qwen3:4b
# pairs nicely with a qwen3:14b chat model — and Nero unloads it right after
# each reflection so it doesn't crowd VRAM. Leave empty ("") to reuse the
# main model instead (no extra VRAM, slightly slower background reflection).
reflection_model: "qwen3:4b"

# Creativity of responses. 0.0 = focused and consistent, 1.0 = more creative.
temperature: 0.7

# Reasoning models (Qwen3, R1, …) can "think out loud" in <think>…</think>
# blocks. false keeps Nero's replies direct — and lets reflection produce clean
# output. Set true only if you want to watch her reason step by step.
thinking: false

# ---- Voice (local neural text-to-speech) ----
# Nero can speak with a real, local neural voice — nothing is sent to the cloud.
# This needs the (optional) voice dependency:  pip install -r requirements-voice.txt
# If it's not installed, Nero simply falls back to your browser's built-in
# voice, so this is safe to leave on.
tts_enabled: true

# Engine. Today: "kokoro" — premium English via Kokoro on ONNX Runtime (fast,
# light, no PyTorch, works on Python 3.13). Croatian (Meta MMS-TTS) and an
# expressive engine (Chatterbox) are coming next.
tts_engine: "kokoro"

# Which voice. Kokoro ships 50+; American-female options include af_heart
# (warm, the default), af_bella, af_nicole, af_sarah. See the Kokoro voice list.
tts_voice: "af_heart"

# Speaking rate (1.0 = natural; <1 slower, >1 faster).
tts_speed: 1.0

# Where the Kokoro model files live. Downloaded once (~310 MB) on first use.
# Relative paths are under the project folder.
tts_model_dir: "models"

# ---- Agent (Phase 1: the hands) ----
# Nero's ability to take verified actions via tools (capabilities), behind a
# security gate. Read-only to start (git.status); anything that changes files
# waits for your confirmation.
agent_enabled: true

# Safety bounds on the reason→tool→observe loop: the most tool steps in one turn,
# and the most wall-clock seconds before she returns a graceful partial answer.
agent_max_steps: 8
agent_max_seconds: 60

# The project directory the agent is jailed to (filesystem/terminal tools can't
# escape it) and observes for git branch/state. Blank = the folder Nero runs
# from. Use a full path to point her at a specific project.
agent_project_dir: ""

# ---- External Council (optional cloud escalation) ----
#
# Nero is local-first. This is OFF by default, and the browser asks for a
# confirmation on every Council request. A run has a fixed, visible sequence:
# OpenAI (architect) -> Claude (builder) -> OpenAI (reviewer).
#
# Only the task you type and the immediately preceding council handoff leave
# Nero. Your memories, normal chat history, local files, and API keys are never
# sent as part of a Council request. API use is billed separately from consumer
# ChatGPT / Claude subscriptions.
collaboration:
  enabled: false

  # Keep real keys only in your private config.yaml. Never put keys in a chat,
  # screenshot, or this example file.
  openai:
    api_key: ""
    # Enter a model ID available in your OpenAI API account.
    model: ""

  anthropic:
    api_key: ""
    # Enter a model ID available in your Anthropic API account.
    model: ""

  # Guardrails for one Council run: 2 requests in plan-build mode, or 3 in the
  # default plan-build-review mode. Values are clamped to safe bounds by Nero.
  timeout_seconds: 90
  max_output_tokens: 1800
  max_handoff_chars: 12000

# ---- Presence (visual counterpart to the voice) ----
# Nero's Presence Director is a renderer-agnostic subsystem: the "brain" only
# expresses intent (state + emotion + intensity); the active runtime decides
# what visible motion supports that intent. Today the built-in runtimes are
# `null` (no visual, silent) and `log` (prints intent flow — useful for
# development). Live2D / Godot / Unreal runtimes are future additions.
#
# Runtime-specific settings (Live2D WebSocket URL, Godot binary path) belong
# INSIDE each runtime's own configuration — NOT here at the app level. That
# keeps this block stable when new runtimes ship.
presence:
  # Master switch. `false` skips creating the Presence Director entirely.
  enabled: true

  # Which runtime to instantiate. "null" | "log" | future runtimes.
  # Recommended: "log" during development, "null" for a truly silent pipeline.
  runtime: "log"

  # Requested max Presence Level (0..5). Capped at the active runtime's ceiling.
  #   0 = voice only, no visual manifestation
  #   1 = minimal manifestation (eyes, particles, ambient glow)
  #   2 = animated portrait (breathing, eye movement)
  #   3 = half-body companion
  #   4 = full-body companion
  #   5 = immersive (VR / AR / mixed reality)
  level: 0

  # Verbose per-event logging. Off by default.
  debug: false

  # Runtime-specific settings, opaque to the app. Each runtime interprets
  # its own keys per its own schema. Below is the schema Live2DRuntime reads;
  # LogRuntime and NullRuntime ignore this block entirely.
  #
  # Full documentation: presence/runtime_bridge/live2d_protocol.md
  settings:
    # WebSocket URL of the Cubism viewer process. Local-only by default.
    websocket_url: "ws://127.0.0.1:3939/nero"

    # Exponential backoff between reconnect attempts, in seconds. The last
    # value repeats forever. Nero NEVER blocks voice/chat on presence — the
    # runtime keeps trying to reconnect in the background.
    reconnect_backoff_s: [1.0, 2.0, 5.0, 10.0, 30.0]

    # Max reconnect attempts before giving up. 0 = forever.
    max_reconnect_attempts: 0

    # Send-queue depth. If the viewer stalls, the queue fills and the oldest
    # parameter frame is dropped (stale intent is worse than dropped intent).
    send_queue_max: 256

    # WebSocket keepalive.
    connect_timeout_s: 5.0
    ping_interval_s: 20.0
    ping_timeout_s: 20.0

    # Default parameter blend duration (ms) sent with each `params` message.
    # Zero = snap. Viewer may override per-message.
    param_blend_ms: 100

    # If the loaded Cubism model uses different parameter names than the
    # Nero convention (ParamNero*), override them here. Empty = use defaults.
    # Example:  {overall_visibility: "ParamNeroVisible"}
    cubism_param_overrides: {}

# ---- Server ----

# 0.0.0.0 lets your other devices (via Tailscale) reach the AI.
# Leave this as-is unless you know you want localhost-only.
host: "0.0.0.0"

# The port the web app runs on. http://<your-pc>:8080
port: 8080
