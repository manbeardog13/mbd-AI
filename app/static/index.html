<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F7F5" />

  <!-- Make it feel like a native app when added to the home screen -->
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Nero" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />

  <title>Nero</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="/static/icon.svg" />
</head>
<body>
  <!-- icon sprite -->
  <svg width="0" height="0" class="sprite" aria-hidden="true">
    <symbol id="i-spark" viewBox="0 0 24 24"><path d="M12 2.5l1.9 6.4c.2.6.6 1 1.2 1.2l6.4 1.9-6.4 1.9c-.6.2-1 .6-1.2 1.2L12 21.5l-1.9-6.4c-.2-.6-.6-1-1.2-1.2L2.5 12l6.4-1.9c.6-.2 1-.6 1.2-1.2z"/></symbol>
    <symbol id="i-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="9.5" y="3" width="5" height="11" rx="2.5"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0M12 17.5V21"/></symbol>
    <symbol id="i-wave" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 10v4M8 6.5v11M12 3.5v17M16 6.5v11M20 10v4"/></symbol>
    <symbol id="i-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6M6.5 11.5 12 6l5.5 5.5"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 8h9M17 8h3M4 16h3M11 16h9"/><circle cx="15" cy="8" r="2.4"/><circle cx="9" cy="16" r="2.4"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-mission" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></symbol>
  </svg>

  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <button id="menu-toggle" class="icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24"><use href="#i-settings"/></svg>
      </button>
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 24 24"><use href="#i-spark"/></svg>
        <span id="ai-name">Nero</span>
        <span id="status-dot" class="status-dot" title="Checking connection…"></span>
      </div>
      <div class="topbar-actions">
        <a href="/mission-control" class="icon-btn" aria-label="Mission Control" title="Mission Control">
          <svg viewBox="0 0 24 24"><use href="#i-mission"/></svg>
        </a>
        <button id="new-chat" class="icon-btn" aria-label="New conversation" title="New conversation">
          <svg viewBox="0 0 24 24"><use href="#i-plus"/></svg>
        </button>
      </div>
    </header>

    <!-- Chat -->
    <main class="chat">
      <div id="messages" class="messages"></div>

      <form id="chat-form" class="composer">
        <div class="composer-inner">
          <textarea id="input" rows="1" placeholder="Message Nero…" autocomplete="off"></textarea>
          <div class="composer-actions">
            <button id="mic" type="button" class="voice-btn" aria-label="Voice recording" title="Voice recording">
              <svg viewBox="0 0 24 24"><use href="#i-mic"/></svg>
            </button>
            <button id="council" type="button" class="council-btn" aria-label="Ask OpenAI and Claude for an External Council" title="Ask OpenAI and Claude. Sends only the text you type after confirmation." disabled>Council</button>
            <button id="convo-mode" type="button" class="voice-btn accent" aria-label="Conversation mode" title="Conversation mode">
              <svg viewBox="0 0 24 24"><use href="#i-wave"/></svg>
            </button>
            <button id="send" type="submit" class="send" aria-label="Send" hidden>
              <svg viewBox="0 0 24 24"><use href="#i-send"/></svg>
            </button>
          </div>
        </div>
        <p id="status-text" class="status-text">Connecting…</p>
      </form>
    </main>

    <!-- Settings slide-over -->
    <div id="scrim" class="scrim" hidden></div>
    <aside id="sidebar" class="settings">
      <div class="settings-head">
        <h2>Settings</h2>
        <button id="settings-close" class="icon-btn" aria-label="Close">
          <svg viewBox="0 0 24 24"><use href="#i-close"/></svg>
        </button>
      </div>

      <section class="panel">
        <h3>Humor <span id="humor-val" class="humor-val">75%</span></h3>
        <input type="range" id="humor" min="0" max="100" step="5" value="75" />
        <p class="hint">0 serious · 100 comedian</p>
      </section>

      <section class="panel">
        <h3>Voice</h3>
        <label class="toggle">
          <input type="checkbox" id="speak-toggle" />
          <span>Speak replies</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="handsfree-toggle" />
          <span>Hands-free</span>
        </label>
        <div class="field">
          <label for="tts-voice">Voice</label>
          <select id="tts-voice"></select>
        </div>
        <div class="field">
          <label for="mic-lang">Language</label>
          <select id="mic-lang">
            <option value="en-US">English</option>
            <option value="hr-HR">Hrvatski</option>
          </select>
        </div>
      </section>

      <section class="panel">
        <h3>Memories</h3>
        <form id="memory-form">
          <input id="memory-input" type="text" placeholder="Add something to remember…" autocomplete="off" />
          <button type="submit" class="btn small">Add</button>
        </form>
        <ul id="memory-list" class="memory-list"></ul>
      </section>

      <section class="panel">
        <h3>External Council</h3>
        <p id="council-status" class="hint">Checking whether the optional cloud council is available…</p>
      </section>

      <p class="footer-note">Private. On your machine.</p>
    </aside>

    <!-- Conversational mode -->
    <div id="convo-overlay" class="convo" hidden>
      <button id="convo-close" class="convo-close" aria-label="End conversation">
        <svg viewBox="0 0 24 24"><use href="#i-close"/></svg>
      </button>
      <div class="orb-wrap">
        <div id="orb" class="orb"></div>
      </div>
      <p id="convo-status" class="convo-status">Tap to start</p>
      <p id="convo-transcript" class="convo-transcript"></p>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
