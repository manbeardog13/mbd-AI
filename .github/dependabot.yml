version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Zagreb
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns:
          - "*"
        exclude-patterns:
          - pytest
      python-development:
        patterns:
          - pytest

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Europe/Zagreb
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
